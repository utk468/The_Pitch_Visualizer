<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Medical AI</title>
    <link rel="stylesheet" href="/static/css/global.css">
    <link rel="stylesheet" href="/static/css/auth.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body style="display:flex; align-items:center; justify-content:center; background:#000;">
    <div id="login-card" class="auth-card">
        <h2>Welcome Back</h2>
        <p>Please log in to your Medical AI account</p>
        <form id="login-form">
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="login-email" class="auth-input" placeholder="name@example.com" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="login-password" class="auth-input" placeholder="••••••••" required>
            </div>
            <button type="submit" class="auth-btn">Log In</button>
        </form>
        <div class="auth-footer">
            Don't have an account? <a href="/register">Register here</a>
        </div>
    </div>

    <script type="module">
        import API from '/static/js/api.js';
        
        // Redirect if already logged in
        if (localStorage.getItem('access_token')) {
            window.location.href = '/';
        }

        const loginForm = document.getElementById('login-form');
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;

            try {
                const data = await API.login(email, password);
                localStorage.setItem('access_token', data.access_token);
                localStorage.setItem('user', JSON.stringify(data.user));
                window.location.href = '/';
            } catch (err) {
                alert(err.message);
            }
        });
    </script>
</body>
</html>
