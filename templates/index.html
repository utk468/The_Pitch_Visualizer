<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pitch Visualizer | AI Storyboard Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Inter:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="sidebar">
        <h2>Visualizer History</h2>
        <button class="new-chat-btn" onclick="window.startNewChat()">+ New Visualizer</button>
        <div class="thread-list" id="thread-list">
            <!-- Threads loaded here -->
        </div>
        <div class="sidebar-footer">
            <button onclick="window.logout()" style="width: 100%; padding: 0.75rem; background: var(--primary); border: none; color: white; border-radius: 12px; cursor: pointer; font-weight: 700; box-shadow: none;">Logout</button>
        </div>
    </div>

    <main class="main-content">
        <header>
            <h1>The Pitch Visualizer</h1>
            <p>From Script to Cinematic Storyboard</p>
        </header>

        <section class="visualizer-card">
            <textarea id="narrative-input" placeholder="Type or paste your 3-5 sentence sales pitch..."></textarea>
            
            <div class="controls">
                <button id="generate-btn" style="width: 100%; margin-bottom: 1rem;">Generate Visuals</button>
                <div class="custom-dropdown" id="style-dropdown">
                    <div class="dropdown-selected" id="selected-style" onclick="window.toggleDropdown()">Digital Art</div>
                    <div class="dropdown-options" id="dropdown-options">
                        <div class="option" onclick="window.selectStyle('digital_art', 'Digital Art')">Digital Art</div>
                        <div class="option" onclick="window.selectStyle('photorealistic', 'Photorealistic')">Photorealistic</div>
                        <div class="option" onclick="window.selectStyle('sketch', 'Sketch')">Sketch</div>
                        <div class="option" onclick="window.selectStyle('3d_render', '3D Render')">3D Render</div>
                    </div>
                    <input type="hidden" id="style-select" value="digital_art">
                </div>
            </div>

            <div class="loader-wrapper" id="loader">
                <span class="loader"></span>
                <p style="margin-top: 1rem; color: var(--text-muted);">Processing narrative nodes and generating frames...</p>
            </div>

            <div class="storyboard-grid" id="storyboard-container">
                <!-- Panels injected here -->
            </div>
        </section>
    </main>

    <script src="/static/js/app.js" type="module"></script>
</body>
</html>
